  macos:
    name: macOS (clang-analyze)
    runs-on: macos-26
    env:
      XCODE_VERSION: '26.6'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 1

      - name: Analyze OBS Studio
        id: analyze
        uses: ./.github/actions/analyze-obs/run-clang-analyze
        env:
          RESTREAM_CLIENTID: ${{ secrets.restream-client-id }}
          RESTREAM_HASH: ${{ secrets.restream-hash }}
          TWITCH_CLIENTID: ${{ secrets.twitch-client-id }}
          TWITCH_HASH: ${{ secrets.twitch-hash }}
          YOUTUBE_CLIENTID: ${{ secrets.youtube-client-id }}
          YOUTUBE_CLIENTID_HASH: ${{ secrets.youtube-hash }}
          YOUTUBE_SECRET: ${{ secrets.youtube-client-secret }}
          YOUTUBE_SECRET_HASH: ${{ secrets.youtube-client-secret-hash }}
        with:
          architecture: arm64
          config: Debug
          upload-codeql: true
