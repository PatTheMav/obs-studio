name: Publish On Steam
on:
  workflow_call:
    inputs:
      dry-run:
        type: boolean
        description: Enable dry-run mode (no side-effects).
        required: false
        default: false
      ref:
        type: string
        description: Git reference to use for workflow
        required: false
      windows-x64-url:
        type: string
        description: Optional Windows X64 asset URL
        required: false
      windows-arm64-url:
        type: string
        description: Optional Windows ARM64 asset URL
        required: false
      macos-apple-url:
        type: string
        description: Optional macOS Apple Silicon asset URL
        required: false
      macos-intel-url:
        type: string
        description: Optional macOS Intel asset URL
        required: false

permissions: {}
jobs:
  macos-build:
    name: macOS
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        architecture: [arm64, x86_64]
    defaults:
      run:
        shell: zsh --no-rcs --errexit --pipefail {0}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0

      - name: Setup Custom Asset
        id: setup
        env:
          APPLE_ASSET_URL: ${{ inputs.macos-apple-url }}
          INTEL_ASSET_URL: ${{ inputs.macos-intel-url }}
          ARCHITECTURE: ${{ matrix.architecture }}
        run: |
          : Setup Custom Asset
          if (( ${+RUNNER_DEBUG} )) setopt XTRACE

          case ${(L)ARCHITECTURE} {
            arm64) print "url=${APPLE_ASSET_URL}" >> ${GITHUB_OUTPUT} ;;
            x86_64) print "url=${INTEL_ASSET_URL}" >> ${GITHUB_OUTPUT} ;;
          }

      - name: Download Asset
        id: download
        uses: ./.github/actions/download-asset
        with:
          platform: macOS
          architecture: ${{ matrix.architecture }}
          path: ${{ github.workspace }}/steam_asset
          custom-asset: ${{ steps.custom.setup.url }}

      - name: Prepare Asset
        id: prepare
        uses: ./.github/actions/publish-steam/prepare-asset
        with:
          platform: macOS
          architecture: ${{ matrix.architecture }}
          target: ${{ matrix.target }}
          path: ${{ github.workspace }}/steam_asset

      - name: Upload Asset Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: steam-asset-macos-${{ matrix.architecture }}
          path: ${{ steps.prepare.outputs.asset-path }}

  windows-build:
    name: Windows
    strategy:
      matrix:
        architecture: [x64]
    runs-on: windows-2025-vs2026
    needs: check-event
    defaults:
      run:
        shell: bash --noprofile --norc -eo pipefail {0}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0

      - name: Setup Custom Asset
        id: setup
        env:
          X64_ASSET_URL: ${{ inputs.windows-x64-url }}
          ARM64_ASSET_URL: ${{ inputs.windows-arm64-url }}
          ARCHITECTURE: ${{ matrix.architecture }}
        run: |
          : Setup Custom Asset
          if (( ${+RUNNER_DEBUG} )) setopt XTRACE

          case ${(L)ARCHITECTURE} {
            arm64) print "url=${ARM64_ASSET_URL}" >> ${GITHUB_OUTPUT} ;;
            x64) print "url=${X64_ASSET_URL}" >> ${GITHUB_OUTPUT} ;;
          }

      - name: Download Assets
        id: download
        uses: ./.github/actions/download-asset
        with:
          platform: Windows
          architecture: ${{ matrix.architecture }}
          path: ${{ github.workspace }}/steam_asset
          custom-asset: ${{ steps.custom.setup.url }}

      - name: Prepare Asset
        id: prepare
        uses: ./.github/actions/publish-steam/prepare-asset
        with:
          platform: Windows
          architecture: ${{ matrix.architecture }}
          target: ${{ matrix.target }}
          path: ${{ github.workspace }}/steam_asset

      - name: Upload Asset Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: steam-asset-windows-${{ matrix.architecture }}
          path: ${{ steps.prepare.outputs.asset-path }}

  create-package:
    name: Create Steam Package
    runs-on: ubuntu-26.04
    needs: [macos-build, windows-build]
    defaults:
      run:
        shell: bash --noprofile --norc -eo pipefail {0}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0

      - name: Download Asset Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: steam-assets
          pattern: steam-asset-*
          merge-multiple: true

      - name: Setup Branches
        id: setup
        uses: ./.github/actions/publish-steam/setup-branches
        with:
          ref-name: ${{ github.ref_name }}

      - name: Upload Steam Assets
        uses: ./.github/actions/publish-steam/upload-assets
        with:
          path: ${{ github.workspace }}/steam-assets
          dry-run: ${{ inputs.dry-run }}
          steam-secret: ${{ secrets.STEAM_SHARED_SECRET }}
          steam-user: ${{ secrets.STEAM_USER }}
          steam-password: ${{ secrets.STEAM_PASSWORD }}
          branch-name: ${{ steps.setup.outputs.branch-name }}
          description: ${{ steps.setup.outputs.description }}

      - name: Upload Steam Playtest Assets
        if: ${{ fromJSON(steps.setup.outputs.is-prerelease )}}
        uses: ./.github/actions/publish-steam/upload-assets
        with:
          path: ${{ github.workspace }}//steam-assets
          dry-run: ${{ inputs.dry-run }}
          steam-secret: ${{ secrets.STEAM_SHARED_SECRET }}
          steam-user: ${{ secrets.STEAM_USER }}
          steam-password: ${{ secrets.STEAM_PASSWORD }}
          branch-name: ${{ steps.setup.outputs.branch-name }}
          use-playtest: ${{ steps.setup.outputs.is-prerelease }}
