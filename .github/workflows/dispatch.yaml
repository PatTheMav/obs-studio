name: Dispatch
run-name: Dispatched - ${{ inputs.job }}
on:
  workflow_dispatch:
    inputs:
      job:
        description: Maintenance job to run
        required: true
        type: choice
        options:
          - codeql
          - services-check
          - download-lang-files
          - update-docs
          - generate-appcasts
          - generate-updates
          - publish-steam
      steam-asset-macos-apple:
        description: Custom steam asset URL for Apple Silicon
        type: string
        default: ''
      steam-asset-macos-intel:
        description: Custom steam asset URL for Intel-based Macs
        type: string
        default: ''
      steam-asset-windows-x64:
        description: Custom steam asset URL for Intel-based Windows
        type: string
        default: ''
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read                # Necessary for repository checkouts.
defaults:
  run:
    shell: bash --noprofile --norc -eo errexit -eo pipefail -eo nounset {0}
jobs:
  analyze-project:
    name: Code Analysis
    if: inputs.job == 'codeql'
    uses: ./.github/workflows/analyze-project.yaml
    permissions:
      contents: read            # Necessary for repository checkouts.
      security-events: write    # Necessary to post CodeQL security scanning reports
    secrets: inherit            # zizmor: ignore[secrets-inherit]
    with:
      environment: nightly

  services-availability:
    name: Check Service Availability
    runs-on: ubuntu-slim
    if: inputs.job == 'services-check'
    environment:
      name: nightly
      deployment: false
    permissions:
      contents: write         # Necessary to push commits to repository
      checks: write           # Necessary to create error annotations
      pull-requests: write    # Necessary to create pull requests
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Check Services
        uses: ./.github/actions/lint-obs/validate-services-data
        with:
          path: 'plugins/rtmp-services/data/*.json'
          api-token: ${{ secrets.SERVICE_CHECK_API_KEY }}
          api-servers: ${{ secrets.SERVICE_CHECK_SERVERS }}
          run-schema-checks: true
          run-service-checks: true
          create-pull-request: true
          purge-age: ${{ vars.SERVICE_CHECK_PURGE_AGE }}

  download-language-files:
    name: Download Language Files
    runs-on: ubuntu-slim
    if: fromJSON(vars.ENABLE_L10N_UPDATE || 'false') && inputs.job == 'download-lang-files'
    environment:
      name: nightly
      deployment: false
    env:
      CROWDIN_PAT: ${{ secrets.CROWDIN_SYNC_CROWDIN_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:                   # zizmor: ignore[artipacked]
          token: ${{ secrets.CROWDIN_SYNC_GITHUB_PAT }}
          fetch-depth: 1

      - name: Download Language Files
        uses: obsproject/obs-crowdin-sync/download@4b488c7ced03aa109d9f12529bd91c26c54b3e89

  update-documentation:
    name: Update Documentation
    runs-on: ubuntu-slim
    if: >-
      fromJSON(vars.ENABLE_DOCUMENTATION_UPDATE || 'false')
      && inputs.job == 'update-docs'
    environment:
      name: nightly
      deployment: false
    outputs:
      artifact-name: ${{ steps.generate.outputs.artifact-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Generate Documentation
        id: generate
        uses: ./.github/actions/generate-docs
        with:
          disable-link-extensions: false

  update-documentation-cloudflare:
    name: Update Documentation For Cloudflare
    runs-on: ubuntu-slim
    if: >-
      fromJSON(vars.ENABLE_DOCUMENTATION_UPDATE || 'false')
      && inputs.job == 'update-docs'
    environment:
      name: nightly
      deployment: false
    outputs:
      artifact-name: ${{ steps.generate.outputs.artifact-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Generate Documentation
        id: generate
        uses: ./.github/actions/generate-docs
        with:
          disable-link-extensions: true

  deploy-documentation:
    name: Deploy Documentation To Cloudflare
    runs-on: ubuntu-slim
    needs: update-documentation-cloudflare
    if: >-
      fromJSON(vars.ENABLE_DOCUMENTATION_UPDATE || 'false')
      && inputs.job == 'update-docs'
    environment:
      name: cf-pages-deploy
      deployment: false
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.update-documentation-cloudflare.outputs.artifact-name }}
          path: docs

      - name: Set Up Redirects
        env:
          CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT }}
        run: |
          : Set Up Redirects
          if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi
          {
            echo "/previous/27.2 https://obsproject.com/docs/27.2 302"
            echo "/previous/:major.:minor https://:major-:minor.${CF_PAGES_PROJECT}.pages.dev 302"
          } >> "${GITHUB_WORKSPACE}/docs/_redirects"

      - name: Publish To Live Page
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          workingDirectory: ${{ format('{0}/docs', github.workspace) }}
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: >-
            ${{ format(
              'pages deploy {0}/docs --project-name={1} --commit-hash={2}',
              github.workspace, vars.CF_PAGES_PROJECT, github.sha
            ) }}

  generate-appcasts:
    name: Generate Sparkle AppCast files
    runs-on: macos-26
    if: >-
      fromJSON(vars.ENABLE_UPDATE_GENERATION || 'false')
      && inputs.job == 'generate-appcasts'
    environment:
      name: code-signing
      deployment: false
    strategy:
      fail-fast: true
      matrix:
        architecture: [arm64, x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Generate Semver From Tag
        id: semver
        uses: ./.github/actions/check-version-tag
        with:
          ref: ${{ github.ref_name }}
          fail-on-mismatch: true

      - name: Generate Short GitHub SHA
        id: short-sha
        uses: ./.github/actions/generate-short-sha

      - name: Generate Sparkle AppCasts
        uses: ./.github/actions/publish-obs/generate-sparkle-appcast
        with:
          architecture: ${{ matrix.architecture }}
          channel: >-
            ${{ case(
              steps.semver.outputs.pre-release != '', 'beta',
              'stable'
            )}}
          signing-key: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          num-deltas: 3
          rollout-interval: 86400
          custom-title: 'OBS Studio'
          custom-link: 'https://obsproject.com'

  merge-appcasts:
    name: Merge Appcasts
    runs-on: ubuntu-slim
    needs: generate-appcasts
    steps:
      - name: Merge Appcasts
        uses: actions/upload-artifact/merge@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-sparkle-update
          pattern: macos-sparkle-update-*
          delete-merged: true

  generate-windows-updates:
    name: Generate Windows Updater Files
    runs-on: windows-2025-vs2026
    if: >-
      fromJSON(vars.ENABLE_UPDATE_GENERATION || 'false')
      && inputs.job == 'generate-updates'
    environment:
      name: code-signing
      deployment: false
    strategy:
      fail-fast: true
      matrix:
        architecture: [arm64, x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Generate Semver From Tag
        id: semver
        uses: ./.github/actions/check-version-tag
        with:
          ref: ${{ github.ref_name }}
          fail-on-mismatch: true

      - name: Generate Short GitHub SHA
        id: short-sha
        uses: ./.github/actions/generate-short-sha

      - name: Set Up Google Cloud Credentials
        uses: ./pinned/.github/actions/codesign-obs/setup-windows
        with:
          gcp-identity-provider: ${{ secrets.GCP_IDENTITY_POOL }}
          gcp-account-name: ${{ secrets.GCP_SERVICE_ACCOUNT_NAME }}

      - name: Generate Windows Updater Files
        uses: ./.github/actions/publish-obs/generate-windows-update
        with:
          architecture: ${{ matrix.architecture }}
          channel: >-
            ${{ case(
              steps.semver.outputs.pre-release != '', 'beta',
              'stable'
            ) }}

  publish-to-steam:
    name: Publish To Steam
    if: vars.ENABLE_STEAM_PUBLISH && inputs.job == 'publish-steam'
    secrets: inherit            # zizmor: ignore[secrets-inherit]
    permissions:
      contents: read
    uses: ./.github/workflows/publish-steam.yaml
    with:
      environment: code-signing
      macos-apple-url: ${{ inputs.steam-asset-macos-apple }}
      macos-intel-url: ${{ inputs.steam-asset-macos-intel }}
      windows-x64-url: ${{ inputs.steam-asset-windows-x64 }}
