name: Schedule
run-name: Scheduled Repository Actions
on:
  workflow_dispatch:
  schedule:
    - cron: 17 0 * * *
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash --noprofile --norc -eo errexit -eo pipefail -eo nounset {0}
