name: Push Tag
run-name: Push Tag - ${{ github.ref_name }}
on:
  push:
    paths-ignore:
      - '**.md'
    tags:
      - '*'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read                # Necessary for repository checkouts.
defaults:
  run:
    shell: bash --noprofile --norc -eo errexit -eo pipefail -eo nounset {0}
jobs:
  build-project:
    name: Build
    uses: ./.github/workflows/build-project.yaml
    secrets: inherit            # zizmor: ignore[secrets-inherit]
    with:
      environment: build

  update-documentation:
    name: Update Documentation
    runs-on: ubuntu-slim
    if: fromJSON(vars.ENABLE_DOCUMENTATION_UPDATE || 'false')
    needs: build-project
    outputs:
      artifact-name: ${{ steps.generate.outputs.artifact-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check for Changed Files
        id: checks
        uses: ./.github/actions/check-changes
        with:
          base: ${{ github.event.before }}
          pathspec: ':!cmake* :!*CMakeLists.txt'

      - name: Generate Documentation
        id: generate
        uses: ./.github/actions/generate-docs
        with:
          disable-link-extensions: true

  deploy-documentation:
    name: Deploy Documentation To Cloudflare
    runs-on: ubuntu-slim
    if: fromJSON(vars.ENABLE_DOCUMENTATION_UPDATE || 'false')
    needs: update-documentation
    environment:
      name: cf-pages-deploy
      deployment: false
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.update-documentation.outputs.artifact-name }}
          path: docs

      - name: Set Up Redirects
        env:
          CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT }}
        run: |
          : Set Up Redirects
          if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi
          {
            echo "/previous/27.2 https://obsproject.com/docs/27.2 302"
            echo "/previous/:major.:minor https://:major-:minor.${CF_PAGES_PROJECT}.pages.dev 302"
          } >> "${GITHUB_WORKSPACE}/docs/_redirects"

      - name: Publish To Live Page
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          workingDirectory: ${{ github.workspace }}/docs
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: >-
            pages publish ${{ github.workspace }}/docs
            --project-name=${{ vars.CF_PAGES_PROJECT }}
            --commit-hash=${{ github.sha }}

  sign-windows-build:
    name: Windows Signing
    if: ${{ fromJSON(vars.ENABLE_WINDOWS_CODE_SIGNING || 'false') }}
    needs: build-project
    uses: obsproject/obs-studio/.github/workflows/sign-windows.yaml@a4a11c3dcdd7f479c8c4d1eb6ed8991fbc54dc6d
    secrets: inherit            # zizmor: ignore[secrets-inherit]
    permissions:
      contents: read            # Necessary to keep workflow base permissions.
      attestations: write       # Necessary to generate an attestation for the code signed build.
    with:
      environment: windows-signing

  create-release:
    name: Create Release
    runs-on: ubuntu-slim
    needs: [build-project, sign-windows-build]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Generate Semver From Tag
        id: semver
        uses: ./.github/actions/check-version-tag
        with:
          ref: ${{ github.ref_name }}

      - name: Generate Short GitHub SHA
        id: short-sha
        uses: ./.github/actions/generate-short-sha

      - name: Set Up Environment
        id: setup
        env:
          HAS_SEMVER: ${{ fromJSON(steps.semver.outputs.is-valid-semver) }}
        run: |
          if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi
          if [[ "${HAS_SEMVER:-false}" != 'true' ]]; then
            echo '::error::Current git ref name is not a valid semantic version.'
            return 1
          fi

      - name: Prepare Release Assets
        id: prepare
        uses: ./.github/actions/publish-obs/prepare-release-assets
        with:
          artifact-name: ${{ format('obs-studio-*-{0}*', steps.short-sha.outputs.sha) }}
          version: ${{ steps.semver.outputs.version }}
          download-artifacts: true

      - name: Create Release
        uses: ./.github/publish-obs/create-github-release
        with:
          draft: true
          is-prerelease: ${{ steps.semver.outputs.pre-release != null }}
          tag: ${{ steps.semver.outputs.version }}
          name: ${{ format('OBS Studio {0}', steps.semver.outputs.version) }}
          release-note-file: ${{ steps.prepare.outputs.checksum-file }}
          files: ${{ steps.prepare.outputs.release-files }}
