name: Push
run-name: Push - ${{ github.ref_name }}
on:
  push:
    paths-ignore:
      - '**.md'
    branches:
      - master
      - main
      - 'release/**'
    tags:
      - '*'
permissions: {}
concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true
defaults:
  run:
    shell: bash --errexit --noprofile --norc -eo pipefail -eo nounset {0}
jobs:
  lint-project:
    name: Format
    uses: ./.github/workflows/lint-project.yaml
    permissions:
      contents: read

  build-project:
    name: Build
    uses: ./.github/workflows/build-project.yaml
    secrets:
      MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
      MACOS_SIGNING_CERT: ${{ secrets.MACOS_SIGNING_CERT }}
      MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
      MACOS_SIGNING_PROVISIONING_PROFILE: ${{ secrets.MACOS_SIGNING_PROVISIONING_PROFILE }}
      MACOS_NOTARIZATION_USERNAME: ${{ secrets.MACOS_NOTARIZATION_USERNAME }}
      MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
      RESTREAM_CLIENTID: ${{ secrets.RESTREAM_CLIENTID }}
      RESTREAM_HASH: ${{ secrets.RESTREAM_HASH }}
      TWITCH_CLIENTID: ${{ secrets.TWITCH_CLIENT_ID }}
      TWITCH_HASH: ${{ secrets.TWITCH_HASH }}
      YOUTUBE_CLIENTID: ${{ secrets.YOUTUBE_CLIENTID }}
      YOUTUBE_CLIENTID_HASH: ${{ secrets.YOUTUBE_CLIENTID_HASH }}
      YOUTUBE_SECRET: ${{ secrets.YOUTUBE_SECRET }}
      YOUTUBE_SECRET_HASH: ${{ secrets.YOUTUBE_SECRET_HASH }}
      GPU_PRIORITY_VAL: ${{ secrets.GPU_PRIORITY_VAL }}
    permissions:
      contents: read

  update-documentation:
    name: Update Documentation
    if: github.repository_owner == 'obsproject' && (github.ref_name == 'master' || github.ref_type == 'tag')
    runs-on: ubuntu-26.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check for Changed Files
        if: github.ref_type != 'tag'
        uses: ./.github/actions/check-changes
        id: checks
        with:
          base: ${{ github.event.before }}
          pathspec: '!(cmake*)'

      - name: Generate Documentation
        uses: ./.github/actions/generate-docs
        if: github.ref_type == 'tag' || fromJSON(steps.checks.outputs.has-changed-files)
        with:
          disableLinkExtensions: ${{ github.ref_type == 'tag' }}

  deploy-documentation:
    name: Deploy Documentation to Cloudflare
    if: github.repository_owner == 'obsproject' && github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    needs: update-documentation
    permissions:
      contents: read
    environment:
      name: cf-pages-deploy
    steps:
      - name: Set Up Job Metadata
        id: setup
        env:
          CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT }}
        run: |
          : Set Up Job Metadata
          if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi

          local -a publish_command=(
            pages
            publish
            "${GITHUB_WORKSPACE}/docs"
            "--project-name=${CF_PAGES_PROJECT}"
            "--commit-hash=${GITHUB_SHA:0:9}"
          )

          echo "commitHash=${GITHUB_SHA:0:9}" >> "${GITHUB_OUTPUT}"
          echo "publishCommand=${publish_command[@]}" >> "${GITHUB_OUTPUT}"
          echo "artifactName=OBS Studio Docs (No Extensions) ${GITHUB_SHA:0:9}" >> "${GITHUB_OUTPUT}"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.setup.outputs.artifactName }}
          path: docs

      - name: Set Up Redirects
        env:
          CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT }}
        run: |
          : Set Up Redirects
          if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi

          echo "/previous/27.2 https://obsproject.com/docs/27.2 302" \
            >> "${GITHUB_WORKSPACE}/docs/_redirects"
          echo "/previous/:major.:minor https://:major-:minor.${CF_PAGES_PROJECT}.pages.dev 302" \
            >> "${GITHUB_WORKSPACE}/docs/_redirects"

      - name: Publish to Live Page
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          workingDirectory: ${{ github.workspace }}/docs
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: ${{ steps.setup.outputs.publishCommand }}

  sign-windows-build:
    name: Windows Signing
    uses: obsproject/obs-studio/.github/workflows/sign-windows.yaml@ac19ea663375cd02997be92b7d8ff6dd89a511ad
    if: github.repository_owner == 'obsproject' && github.ref_type == 'tag'
    needs: build-project
    permissions:
      contents: read
      id-token: write       # Necessary fetch an OpenID Connect (OIDC) token.
      attestations: write   # Necessary to generate an attestation for the code signed build.
    secrets:
      GCP_IDENTITY_POOL: ${{ secrets.GCP_IDENTITY_POOL }}
      GCP_SERVICE_ACCOUNT_NAME: ${{ secrets.GCP_SERVICE_ACCOUNT_NAME }}

  create-release:
    name: Create Release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-26.04
    needs: [build-project, sign-windows-build]
    permissions:
      contents: read
    steps:
      - name: Check Release Tag
        id: check
        run: |
          : Check Release Tag
          if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi
          shopt -s extglob

          case "${GITHUB_REF_NAME}" in
            +([0-9]).+([0-9]).+([0-9]) )
              echo 'validTag=true' >> "${GITHUB_OUTPUT}"
              echo 'prerelease=false' >> "${GITHUB_OUTPUT}"
              echo "version=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
              ;;
            +([0-9]).+([0-9]).+([0-9])-@(beta|rc)*([0-9]) )
              echo 'validTag=true' >> "${GITHUB_OUTPUT}"
              echo 'prerelease=true' >> "${GITHUB_OUTPUT}"
              echo "version=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo 'validTag=false' >> "${GITHUB_OUTPUT}"
              ;;
          esac

      - name: Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: ${{ fromJSON(steps.check.outputs.validTag) }}

      - name: Rename Files
        if: fromJSON(steps.check.outputs.validTag)
        env:
          RELEASE_VERSION: ${{ steps.check.outputs.version }}
        run: |
          : Rename Files
          if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi

          shopt -s extglob

          local commit_hash="${GITHUB_SHA:0:9}"
          local -A platform_names=(
            [macos-arm64]=macOS-Apple.dmg
            [macos-arm64-debug-symbols]=macOS-Apple-dSYMs.tar.xz
            [macos-arm64-dev]=macOS-Apple-Libraries.tar.xz
            [macos-x86_64]=macOS-Intel.dmg
            [macos-x86_64-debug-symbols]=macOS-Intel-dSYMs.tar.xz
            [macos-x86_64-dev]=macOS-Intel-Libraries.tar.xz
            [ubuntu-24.04-x86_64]=Ubuntu-24.04-x86_64.deb
            [ubuntu-24.04-x86_64-debug-symbols]=Ubuntu-24.04-x86_64-dbsym.ddeb
            [ubuntu-24.04-x86_64-sources]=Ubuntu-24.04-x86_64-Sources.tar.gz
            [ubuntu-26.04-x86_64]=Ubuntu-26.04-x86_64.deb
            [ubuntu-26.04-x86_64-debug-symbols]=Ubuntu-26.04-x86_64-dbsym.ddeb
            [windows-x64]=Windows-x64.zip
            [windows-x64-installer]=Windows-x64-Installer.exe
            [windows-x64-debug-symbols]=Windows-x64-PDBs.zip
            [windows-arm64]=Windows-ARM64.zip
            [windows-arm64-debug-symbols]=Windows-ARM64-PDBs.zip
          )

          local platform_glob="@(macos|windows|ubuntu-*)-@(arm64|x86_64|x64)"
          local extension_glob="@(dmg|tar.xz|zip|exe|deb|ddeb)"
          local glob_expression="obs-studio-${platform_glob}-${commit_hash}*.${extension_glob}"
          local -a downloaded_files=("${GITHUB_WORKSPACE}"/${glob_expression})

          local platform
          local output_name
          local -a release_files=()
          for file in "${downloaded_files[@]}"; do
            platform="${file//obs-studio-}"
            platform="${platform//"-${commit_hash}"}"

            output_name="OBS-Studio-${RELEASE_VERSION}-${platform_names["${platform}"]}"

            release_files+=("${output_name}")

            mv "${GITHUB_WORKSPACE}/${file}" "${GITHUB_WORKSPACE}/${output_name}"
          done

      - name: Generate Release List And Checksums
        if: fromJSON(steps.check.outputs.validTag)
        id: checksums
        run: |
          : Generate Release List And Checksums
          if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi
          shopt -s extglob

          local -a release_files=()
          local shasum_output
          local checksum

          echo "### Checksums" > "${GITHUB_WORKSPACE}/CHECKSUMS.txt"
          for file in "${GITHUB_WORKSPACE}/"@(*.deb|*.ddeb|*.dmg|*.tar.xz|*.tar.gz|*.exe|*.zip); do
            shasum_output="$(shasum --algorithm=256 "${file}")"
            read -r checksum _ <<< "${shasum_output}"
            echo "    ${file##*/}: ${checksum}" >> "${GITHUB_WORKSPACE}/CHECKSUMS.txt"

            release_files+=("${file}")
          done

          local file_list="$(printf '%s\n' "${release_files[@]}")"

          {
            echo "checksumFile=${GITHUB_WORKSPACE}/CHECKSUMS.txt"
            echo 'releaseFiles<<EOF'
            echo "${file_list}"
            echo EOF
          } >> "${GITHUB_OUTPUT}"

      - name: Create Release
        if: fromJSON(steps.check.outputs.validTag)
        id: create_release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: true
          prerelease: ${{ fromJSON(steps.check.outputs.prerelease) }}
          tag_name: ${{ steps.check.outputs.version }}
          name: OBS Studio ${{ steps.check.outputs.version }}
          body_path: ${{ github.workspace }}/CHECKSUMS.txt
          files: ${{ steps.checksums.outputs.releaseFiles }}
