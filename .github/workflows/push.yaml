name: Push
run-name: Push - ${{ github.ref_name }}
on:
  push:
    paths-ignore:
      - '**.md'
    branches:
      - master
      - main
      - 'release/**'
permissions:
  contents: read    # Necessary for repository checkouts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash --noprofile --norc -eo errexit -eo pipefail -eo nounset {0}
jobs:
  lint-project:
    name: Format
    uses: ./.github/workflows/lint-project.yaml
    permissions:
      contents: read    # Necessary to keep workflow-level permission
      checks: write     # Necessary to produce annotations

  build-project:
    name: Build
    uses: ./.github/workflows/build-project.yaml
    secrets:
      macos-signing-identity: ${{ secrets.MACOS_SIGNING_IDENTITY }}
      macos-signing-certificate: ${{ secrets.MACOS_SIGNING_CERT }}
      macos-signing-password: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
      macos-provisioning-profile: ${{ secrets.MACOS_SIGNING_PROVISIONING_PROFILE }}
      macos-notarization-user: ${{ secrets.MACOS_NOTARIZATION_USERNAME }}
      macos-notarization-password: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
      restream-client-id: ${{ secrets.RESTREAM_CLIENTID }}
      restream-hash: ${{ secrets.RESTREAM_HASH }}
      twitch-client-id: ${{ secrets.TWITCH_CLIENT_ID }}
      twitch-hash: ${{ secrets.TWITCH_HASH }}
      youtube-client-id: ${{ secrets.YOUTUBE_CLIENTID }}
      youtube-client-hash: ${{ secrets.YOUTUBE_CLIENTID_HASH }}
      yotube-client-secret: ${{ secrets.YOUTUBE_SECRET }}
      yotube-client-secret-hash: ${{ secrets.YOUTUBE_SECRET_HASH }}
      gpu-priority-val: ${{ secrets.GPU_PRIORITY_VAL }}

  update-documentation:
    name: Update Documentation
    if: |-
      fromJSON(vars.ENABLE_DOCUMENTATION_UPDATE || 'false')
      && contains(fromJSON('["master", "main"]'), github.ref_name)
    runs-on: ubuntu-26.04
    outputs:
      artifact-name: ${{ steps.generate.outputs.artifact-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check for Changed Files
        uses: ./.github/actions/check-changes
        id: checks
        with:
          base: ${{ github.event.before }}
          pathspec: ':!cmake* :!*CMakeLists.txt'

      - name: Generate Documentation
        uses: ./.github/actions/generate-docs
        id: generate
        if: fromJSON(steps.checks.outputs.has-changed-files)
        with:
          disable-link-extensions: false
