name: Build Project
on:
  workflow_call:
permissions: {}
defaults:
  run:
    shell: bash --errexit --noprofile --norc -eo pipefail -eo nounset {0}
jobs:
  check-event:
    name: Event Data
    runs-on: ubuntu-26.04
    permissions:
      contents: read
    outputs:
      codesign: ${{ steps.setup.outputs.codesign }}
      commitHash: ${{ steps.setup.outputs.commitHash }}
      config: ${{ steps.setup.outputs.config }}
      notarize: ${{ steps.setup.outputs.notarize }}
      package: ${{ steps.setup.outputs.package }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check Event Data
        id: setup
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NUMBER: ${{ github.event.number }}
        run: |
          : Check Event Data
          if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi

          local -A config_data=(
            [codesign]='false'
            [notarize]='false'
            [package]='false'
            [config]=RelWithDebInfo
          )

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              json_data="$(gh pr view "${GITHUB_EVENT_NUMBER:-}" --json labels)"

              local -i has_seeking_testers=0
              jq --raw-output --exit-status \
                '.labels[] | select(.name == "Seeking Testers")' \
              <<< "${json_data}" && has_seeking_testers=1

              if (( has_seeking_testers )); then
                config_data[codesign]='true'
                config_data[package]='true'
              fi
              ;;
            push)
              config_data[codesign]='true'
              config_data[package]='true'

              local version_regex='[0-9]+\.[0-9]+\.[0-9]+(-(rc|beta).+)?'
              if [[ "${GITHUB_REF_NAME}" =~ ${version_regex} ]]; then
                config_data[notarize]='true'
                config_data[config]='Release'
              fi
              ;;
            workflow_dispatch)
              config_data[codesign]='true'
              ;;
            schedule)
              config_data[codesign]='true'
              config_data[package]='true'
              ;;
            *) ;;
          esac

          local key
          local value
          local config
          for config in "${config_data[@]@K}"; do
            read -r key value <<< "${config}"
            echo "${key}=${value}" >> "${GITHUB_OUTPUT}"
          done
          echo "commitHash=${GITHUB_SHA:0:9}" >> "${GITHUB_OUTPUT}"

  macos-build:
    name: macOS
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        target: [arm64, x86_64]
    outputs:
      outputName: ${{ steps.setup.outputs.outputName }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0

      - name: Set Up Environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          target: ${{ matrix.target }}
          xcode-version: '26.5'

      - name: Restore Xcode Compilation Cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: xcode-cache
        with:
          path: ${{ steps.setup.outputs.xcode-cas-path }}
          key: ${{ runner.os }}-xcode-${{ matrix.target }}-${{ steps.setup.outputs.config }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ matrix.target }}-

      - name: Set Up Code Signing
        uses: ./.github/actions/setup-macos-codesigning
        if: fromJSON(steps.setup.outputs.codesign)
        id: codesign
        with:
          identity: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          cert: ${{ secrets.MACOS_SIGNING_CERT }}
          cert-password: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
          provisioning-profile: ${{ secrets.MACOS_SIGNING_PROVISIONING_PROFILE }}
          apple-id: ${{ secrets.MACOS_NOTARIZATION_USERNAME }}
          apple-secret: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}

      - name: Build OBS Studio
        id: build
        uses: ./.github/actions/build-obs
        env:
          RESTREAM_CLIENTID: ${{ secrets.RESTREAM_CLIENTID }}
          RESTREAM_HASH: ${{ secrets.RESTREAM_HASH }}
          TWITCH_CLIENTID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_HASH: ${{ secrets.TWITCH_HASH }}
          YOUTUBE_CLIENTID: ${{ secrets.YOUTUBE_CLIENTID }}
          YOUTUBE_CLIENTID_HASH: ${{ secrets.YOUTUBE_CLIENTID_HASH }}
          YOUTUBE_SECRET: ${{ secrets.YOUTUBE_SECRET }}
          YOUTUBE_SECRET_HASH: ${{ secrets.YOUTUBE_SECRET_HASH }}
          XCODE_CAS_PATH: ${{ steps.setup.outputs.xcode-cas-path }}
        with:
          config: ${{ steps.setup.outputs.config }}
          target: ${{ matrix.target }}
          codesign: ${{ fromJSON(steps.setup.outputs.codesign) && fromJSON(steps.codesign.outputs.can-codesign) }}
          codesign-ident: ${{ steps.codesign.outputs.identity }}
          codesign-team: ${{ steps.codesign.outputs.team }}
          provisioningProfileUUID: ${{ steps.codesign.outputs.profile-uuid }}
          path: ${{ github.workspace }}

      - name: Package OBS Studio
        uses: ./.github/actions/package-obs
        id: package
        if: ${{ fromJSON(steps.setup.outputs.package) }}
        with:
          config: ${{ steps.setup.outputs.config }}
          target: ${{ matrix.target }}
          package: ${{ fromJSON(steps.setup.outputs.package) }}
          outputName: ${{ steps.setup.outputs.outputName }}
          codesign-ident: ${{ fromJSON(steps.setup.outputs.codesign) && fromJSON(steps.codesign.outputs.can-codesign) }}
          codesignIdent: ${{ steps.codesign.outputs.identity }}
          codesign-user: ${{ secrets.MACOS_NOTARIZATION_USERNAME }}
          codesign-pass: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          notarize: ${{ fromJSON(steps.setup.outputs.notarize) && fromJSON(steps.codesign.outputs.can-notarize) }}

      - name: Upload Application
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ fromJSON(steps.setup.outputs.package) }}
        with:
          name: ${{ steps.setup.outputs.output-name }}
          path: ${{ github.workspace }}/build_macos/obs-studio-*-macos-${{ steps.setup.outputs.cpuName }}.*

      - name: Upload Debug Symbols
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ steps.setup.outputs.config == 'Release' }}
        with:
          name: ${{ steps.setup.outputs.output-name }}-debug-symbols
          path: ${{ runner.temp }}/${{ steps.setup.outputs.output-name }}-dSYMs.tar.xz

      - name: Upload Developer Library
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ needs.check-event.outputs.config == 'Release' }}
        with:
          name: ${{ steps.setup.outputs.outputName }}-plugin-dev
          path: ${{ runner.temp }}/${{ steps.setup.outputs.outputName }}-plugin-dev.tar.xz

      - name: Save Xcode Compilation Cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        if: github.event_name != 'pull_request' && steps.xcode-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ steps.setup.outputs.xcode-cas-path }}
          key: ${{ runner.os }}-xcode-${{ matrix.target }}-${{ steps.setup.outputs.config }}

  ubuntu-build:
    name: Ubuntu
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-26.04]
    runs-on: ${{ matrix.os }}
    needs: check-event
    outputs:
      outputName: ${{ steps.setup.outputs.outputName }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0

      - name: Set Up Environment
        id: setup
        env:
          COMMIT_HASH: ${{ needs.check-event.outputs.commitHash }}
          MATRIX_OS: ${{ matrix.os }}
        run: |
          : Set Up Environment
          if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi

          echo "outputName=obs-studio-${MATRIX_OS}-x86_64-${COMMIT_HASH}" >> "${GITHUB_OUTPUT}"

      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: ccache-cache
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-${{ matrix.os }}-ccache-x86_64-${{ needs.check-event.outputs.config }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.os }}-ccache-x86_64-

      - name: Build OBS Studio
        uses: ./.github/actions/build-obs
        env:
          RESTREAM_CLIENTID: ${{ secrets.RESTREAM_CLIENTID }}
          RESTREAM_HASH: ${{ secrets.RESTREAM_HASH }}
          TWITCH_CLIENTID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_HASH: ${{ secrets.TWITCH_HASH }}
          YOUTUBE_CLIENTID: ${{ secrets.YOUTUBE_CLIENTID }}
          YOUTUBE_CLIENTID_HASH: ${{ secrets.YOUTUBE_CLIENTID_HASH }}
          YOUTUBE_SECRET: ${{ secrets.YOUTUBE_SECRET }}
          YOUTUBE_SECRET_HASH: ${{ secrets.YOUTUBE_SECRET_HASH }}
        with:
          config: ${{ needs.check-event.outputs.config }}
          target: x86_64

      - name: Package OBS Studio
        uses: ./.github/actions/package-obs
        if: ${{ fromJSON(needs.check-event.outputs.package) }}
        with:
          config: ${{ needs.check-event.outputs.config }}
          target: x86_64
          package: ${{ fromJSON(needs.check-event.outputs.package) }}
          outputName: ${{ steps.setup.outputs.outputName }}

      - name: Upload Application
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ fromJSON(needs.check-event.outputs.package) }}
        with:
          name: ${{ steps.setup.outputs.outputName }}
          path: ${{ runner.temp }}/${{ steps.setup.outputs.outputName }}.*

      - name: Upload Source Tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ fromJSON(needs.check-event.outputs.package) }}
        with:
          name: ${{ steps.setup.outputs.outputName }}-sources
          path: ${{ runner.temp }}/${{ steps.setup.outputs.outputName }}-sources.*

      - name: Upload Debug Symbol Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ fromJSON(needs.check-event.outputs.package) }}
        with:
          name: ${{ steps.setup.outputs.outputName }}-debug-symbols
          path: ${{ runner.temp }}/${{ steps.setup.outputs.outputName }}-dbgsym.ddeb

      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        if: github.event_name != 'pull_request' && steps.ccache-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-${{ matrix.os }}-ccache-x86_64-${{ needs.check-event.outputs.config }}

  flatpak-build:
    name: Flatpak
    runs-on: ubuntu-24.04
    needs: check-event
    env:
      FLATPAK_BUILD_SHARE_PATH: flatpak_app/files/share
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08@sha256:364e5ede018e821ba430849690649ac7ec43d082c29ba4be3d357c517262ea1f
      options: --privileged
      volumes:
        - /opt/hostedtoolcache/CodeQL:/to_clean/codeql
        - /opt/hostedtoolcache/Python:/to_clean/python
        - /usr/local/.ghcup:/to_clean/ghcup
        - /usr/local/lib/android:/to_clean/android
        - /usr/share/dotnet:/to_clean/dotnet
        - /usr/share/swift:/to_clean/swift
    steps:
      - name: Prepare build space
        run: |
          : Prepare build space
          if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi

          local -a to_remove=(Android CodeQL GHCup Python Swift dotNET)

          echo ::group::Available Storage Before Cleanup
          df -h
          echo ::endgroup::

          for removal in "${to_remove[@]}"; do
            echo "::group::Remove ${removal} files"
            rm -rf "/to_clean/${removal,,*}"/*
            echo '::endgroup::'
          done

          echo ::group::Available Storage After Cleanup
          df -h
          echo ::endgroup::

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0
          set-safe-directory: ${{ env.GITHUB_WORKSPACE }}

      - name: Set Up Environment
        id: setup
        env:
          GH_TOKEN: ${{ github.token }}
          MANIFEST_HASH: ${{ hashFiles('build-aux/com.obsproject.Studio.json') }}
        run: |
          : Set Up Environment
          if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi

          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

          local cache_key="flatpak-builder-${MANIFEST_HASH:?}-x86_64"
          local cache_ref='master'
          local cache_key
          cache_key="$(gh cache list \
            --ref "refs/heads/${cache_ref}" \
            --key "${cache_key}" \
            --limit 1 \
            --json key \
            --jq '.[0].key')"

          {
            if [[ -n "${cache_key}" ]]; then
              echo "cache-hit=true"
            else
              echo "cache-hit=false"
            fi

            echo "cache-key=${cache_key}"
          }  >> "${GITHUB_OUTPUT}"

      - name: Validate Flatpak manifest
        uses: ./.github/actions/flatpak-builder-lint
        with:
          artifact: manifest
          path: build-aux/com.obsproject.Studio.json

      - name: Build Flatpak Manifest
        uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb # v6.7
        with:
          build-bundle: ${{ fromJSON(needs.check-event.outputs.package) }}
          bundle: obs-studio-flatpak-${{ needs.check-event.outputs.commitHash }}.flatpak
          cache-key: ${{ steps.setup.outputs.cache-key }}
          cache: ${{ fromJSON(steps.setup.outputs.cache-hit) || (github.event_name == 'push' && github.ref_name == 'master')}}
          manifest-path: ${{ github.workspace }}/build-aux/com.obsproject.Studio.json
          mirror-screenshots-url: https://dl.flathub.org/media
          restore-cache: ${{ fromJSON(steps.setup.outputs.cache-hit) }}

      - name: Validate AppStream
        uses: ./.github/actions/flatpak-builder-lint
        with:
          artifact: appstream
          path: ${{ env.FLATPAK_BUILD_SHARE_PATH }}/metainfo/com.obsproject.Studio.metainfo.xml

      - name: Verify Icon and Metadata in app-info
        working-directory: ${{ env.FLATPAK_BUILD_SHARE_PATH }}
        run: |
          : Verify Icon and Metadata in app-info
          if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi

          if ! [[ -f "${PWD}/app-info/icons/flatpak/128x128/com.obsproject.Studio.png" ]]; then
            echo '::error::Missing 128x128 icon in app-info'
            return 1
          fi

          if ! [[ -f "${PWD}/app-info/xmls/com.obsproject.Studio.xml.gz" ]]; then
            echo '::error::Missing com.obsproject.Studio.xml.gz in app-info'
            return 1
          fi

      - name: Validate build directory
        uses: ./.github/actions/flatpak-builder-lint
        with:
          artifact: builddir
          path: flatpak_app

      - name: Validate repository
        uses: ./.github/actions/flatpak-builder-lint
        with:
          artifact: repo
          path: repo

  windows-build:
    name: Windows
    strategy:
      matrix:
        target: [x64, arm64]
    runs-on: windows-2025-vs2026
    needs: check-event
    outputs:
      outputName: ${{ steps.setup.outputs.outputName }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0

      - name: Set Up Environment
        id: setup
        env:
          COMMIT_HASH: ${{ needs.check-event.outputs.commitHash }}
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          : Set Up Environment
          if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi

          echo "outputName=obs-studio-windows-${MATRIX_TARGET}-${COMMIT_HASH}" >> "${GITHUB_OUTPUT}"

      - name: Build OBS Studio
        uses: ./.github/actions/build-obs
        env:
          GPU_PRIORITY_VAL: ${{ secrets.GPU_PRIORITY_VAL }}
          RESTREAM_CLIENTID: ${{ secrets.RESTREAM_CLIENTID }}
          RESTREAM_HASH: ${{ secrets.RESTREAM_HASH }}
          TWITCH_CLIENTID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_HASH: ${{ secrets.TWITCH_HASH }}
          YOUTUBE_CLIENTID: ${{ secrets.YOUTUBE_CLIENTID }}
          YOUTUBE_CLIENTID_HASH: ${{ secrets.YOUTUBE_CLIENTID_HASH }}
          YOUTUBE_SECRET: ${{ secrets.YOUTUBE_SECRET }}
          YOUTUBE_SECRET_HASH: ${{ secrets.YOUTUBE_SECRET_HASH }}
        with:
          config: ${{ needs.check-event.outputs.config }}
          target: ${{ matrix.target }}

      - name: Package OBS Studio
        uses: ./.github/actions/package-obs
        if: ${{ fromJSON(needs.check-event.outputs.package) }}
        with:
          config: ${{ needs.check-event.outputs.config }}
          target: ${{ matrix.target }}
          package: ${{ fromJSON(needs.check-event.outputs.package) }}
          outputName: ${{ steps.setup.outputs.outputName }}

      - name: Upload Application
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ fromJSON(needs.check-event.outputs.package) }}
        with:
          name: ${{ steps.setup.outputs.outputName }}
          path: ${{ runner.temp }}/${{ steps.setup.outputs.outputName }}.zip

      - name: Upload Developer Library
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ needs.check-event.outputs.config == 'Release' }}
        with:
          name: ${{ steps.setup.outputs.outputName }}-plugin-dev
          path: ${{ runner.temp }}/${{ steps.setup.outputs.outputName }}-plugin-dev.zip
