name: Generate Windows Updater Files
description: Generates proprietary update files to use with OBS Studio's automatic updater on Windows.
inputs:
  architecture:
    description: The CPU architecture to generate updater files for. Available values are 'arm64' or 'x86_64'.
    required: true
  channel:
    description: The update channel to generate updater files for. Available values are 'stable' or 'beta'.
    default: stable
  working-directory:
    description: A path to an OBS Studio checkout.
    default: ${{ github.workspace }}
runs:
  using: composite
  steps:
    - name: Check Runner Operating System
      if: runner.os != 'Windows'
      shell: bash --noprofile --norc -eo errexit -eo pipefail -eo nounset {0}
      run: |
        : Check Runner Operating System
        echo '::error::publish-obs/generate-windows-update action requires a Windows runner.'
        exit 1

    - name: Install Dependencies
      shell: pwsh -command ". '{0}'"
      run: |
        # Install Dependencies
        if ($null -ne $env:RUNNER_DEBUG) { Set-PSDebug -Trace 1 }
        $ErrorActionPreference = 'Stop'

        $WingetInstallArguments = @(
          '--silent'
          '--accept-package-agreements'
          '--accept-source-agreements'
          '--disable-interactivity'
          '--exact'
        )

        winget install @WingetInstallArguments --version 1.74.4 --id Rclone.Rclone
        winget install @WingetInstallArguments --version 3.9.0.2 --id JohnMacFarlane.Pandoc

    - name: Get BOUF Version Data
      id: setup
      shell: bash --noprofile --norc -eo errexit -eo pipefail -eo nounset {0}
      run: |
        : Get BOUF Version Data
        if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi

        jq -r '.configurePresets[]
          | select(.name == "dependencies")
          | .vendor["obsproject.com/obs-studio"].tools.bouf
          | to_entries
          | map("\(.key)=\(.value|tostring)")
          | .[]' "${PWD}/CMakePresets.json" >> "${GITHUB_OUTPUT}"

    - name: Setup BOUF
      id: setup-bouf
      uses: ./.github/actions/publish-obs/setup-bouf
      with:
        version: ${{ steps.setup.outputs.version }}
        checksum: ${{ steps.setup.outputs.hash }}
        nsis-checksum: ${{ steps.setup.outputs.nsis-hash }}
        url: ${{ steps.setup.outputs.baseUrl }}

    - name: Download Asset
      id: download
      uses: ./.github/actions/download-asset
      with:
        platform: windows
        architecture: ${{ inputs.architecture }}
        pattern: '-signed'
        verify: true
        path: ${{ runner.temp }}

    - name: Extract Asset
      id: extract
      shell: pwsh -command ". '{0}'"
      env:
        RELEASE_ASSET: ${{ steps.download.outputs.path }}
      run: |
        # Extract Asset
        if ($null -ne $env:RUNNER_DEBUG) { Set-PSDebug -Trace 1 }
        Expand-Archive -Path $env:RELEASE_ASSET -DestinationPath "${env:RUNNER_TEMP}/current"

    - name: Download Versions
      shell: pwsh -command ". '{0}'"
      env:
        ARCHITECTURE: ${{ inputs.architecture }}
        RCLONE_TRANSFERS: 100
        RCLONE_FAST_LIST: true
        RCLONE_EXCLUDE: ${{ format('{pbs/**,**/{0}/**}', github.ref_name) }}
        RCLONE_GCS_ENV_AUTH: 'true'
        RCLONE_GCS_BUCKET_POLICY_ONLY: 'true'
      run: |
        # Download Versions
        if ($null -ne $env:RUNNER_DEBUG) { Set-PSDebug -Trace 1 }
        ErrorActionPreference = 'Stop'
        & rclone copy ":gcs:obs-builds/${env:ARCHITECTURE}" "${env:RUNNER_TEMP}/previous"

    - name: Prepare Release Notes
      id: release-notes
      shell: pwsh -command ". '{0}'"
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Release notes are just the tag body on Windows
        if ($null -ne $env:RUNNER_DEBUG) { Set-PSDebug -Trace 1 }
        ErrorActionPreference = 'Stop'

        $ReleaseNotesFile = "${env:RUNNER_TEMP}/bouf_notes.rst"

        $TagSubject = & git tag -l --format='%(contents:subject)' $env:GITHUB_REF_NAME
        $TagBody = & git tag -l --format='%(contents:body)' $env:GITHUB_REF_NAME
        $ReleaseNotes = @"
          ${TagSubject}
          ###################################################

          ${TagBody}
        "@

        $ReleaseNotes >> ${ReleaseNotesFile}
        "path=${ReleaseNotesFile}" >> $env:GITHUB_OUTPUT

    - name: Run BOUF
      shell: pwsh -command ". '{0}'"
      env:
        BOUF_PATH: ${{ steps.setup-bouf.outputs.path }}
        UPDATE_CHANNEL: ${{ inputs.channel }}
        RELEASE_NOTES_FILE: ${{ steps.release-notes.outputs.path }}
      run: |
        # Run BOUF
        if ($null -ne $env:RUNNER_DEBUG) { Set-PSDebug -Trace 1 }
        ErrorActionPreference = 'Stop'

        $BoufArgs = @(
          '--config',       "${env:GITHUB_ACTION_PATH}/config.toml",
          '--version',      $env:GITHUB_REF_NAME
          '--branch',       $env:UPDATE_CHANNEL
          '--notes-file',   "${env:RELEASE_NOTES_FILE}"
          '--input',        "${env:RUNNER_TEMP}/current"
          '--previous",     "${env:RUNNER_TEMP}/previous"
          '--output',       "${env:RUNNER_TEMP}/output"
          '--updater-data-only'
        )

        & $env:BOUF_PATH @BoufArgs

    - name: Sync Latest Build
      shell: pwsh -command ". '{0}'"
      env:
        ARCHITECTURE: ${{ inputs.architecture }}
        UPDATE_CHANNEL: ${{ inputs.channel }}
        RCLONE_TRANSFERS: 100
        RCLONE_INCLUDE: ${{ format('**/{0}/**', github.ref_name) }}
        RCLONE_GCS_ENV_AUTH: 'true'
        RCLONE_GCS_BUCKET_POLICY_ONLY: 'true'
      run: |
        # Sync Latest Build
        if ($null -ne $env:RUNNER_DEBUG) { Set-PSDebug -Trace 1 }
        ErrorActionPreference = 'Stop'
        $RcloneArguments = @(
          'sync'
          '--delete-excluded'
          "${env:RUNNER_TEMP}/previous"
          ":gcs:obs-latest/${env:ARCHITECTURE}/${env:UPDATE_CHANNEL}"
        )

        & rclone @RcloneArguments

    - name: Upload Latest Build
      shell: pwsh -command ". '{0}'"
      env:
        ARCHITECTURE: ${{ inputs.architecture }}
        RCLONE_TRANSFERS: 100
        RCLONE_GCS_ENV_AUTH: 'true'
        RCLONE_GCS_BUCKET_POLICY_ONLY: 'true'
      run: |
        # Upload Latest Build
        if ($null -ne $env:RUNNER_DEBUG) { Set-PSDebug -Trace 1 }
        ErrorActionPreference = 'Stop'

        & rclone copy "${env:RUNNER_TEMP}/previous" ":gcs:obs-builds/${env:ARCHITECTURE}"

    - name: Upload Update Files
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: windows-updater-files-${{ inputs.architecture }}
        compression-level: 0
        path: ${{ runner.temp }}/output
