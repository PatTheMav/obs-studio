name: Prepare Release Assets
description: Prepares release assets based on artifacts generated by GitHub Actions workflows.
inputs:
  artifact-name:
    description: A prefix or pattern used to select download workflow assets.
    default: ''
  version:
    description: The semantic version for which release assets should be produced.
    required: true
  download-artifacts:
    description: A boolean value to indicate whether artifacts should be downloaded automatically.
    default: 'false'
  working-directory:
    description: Path to repository checkout
    default: ${{ github.workspace }}
outputs:
  release-files:
    description: A JSON string representing an array of all generated release assets.
    value: ${{ steps.rename.outputs.release-files }}
  checksum-file:
    description: The path to the generated checksums markdown file for generate release assets.
    value: ${{ steps.checksums.outputs.checksum-file }}
runs:
  using: composite
  steps:
    - name: Download Assets
      id: download
      if: fromJSON(inputs.download-artifacts)
      working-directory: ${{ inputs.working-directory }}
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

    - name: Install Bash
      id: install-bash
      if: runner.os == 'macOS'
      shell: bash --noprofile --norc -eo errexit -eo pipefail -eo nounset {0}
      run: |
        : Install Bash
        if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi
        declare brew_prefix="$(brew --prefix)"
        if [[ ! -d "${brew_prefix}/bin/bash" ]]; then brew install --quiet bash; fi

    - name: Rename Assets
      id: rename
      shell: bash --noprofile --norc -eo errexit -eo pipefail -eo nounset {0}
      working-directory: ${{ inputs.working-directory }}
      env:
        ARTIFACT_PATTERN: ${{ inputs.artifact-prefix }}
        RELEASE_VERSION: ${{ inputs.version }}
      run: ${GITHUB_ACTION_PATH}/rename-assets.bash

    - name: Generate Checksums
      id: checksums
      shell: bash --noprofile --norc -eo errexit -eo pipefail -eo nounset {0}
      working-directory: ${{ inputs.working-directory }}
      env:
        RELEASE_FILES: ${{ steps.rename.outputs.release-files }}
        RELEASE_VERSION: ${{ inputs.version }}
      run: ${GITHUB_ACTION_PATH}/generate-checksums.bash
