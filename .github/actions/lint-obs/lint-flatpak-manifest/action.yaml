name: Lint Flatpak Manifest
description: Runs flatpak-builder-lint with exceptions
inputs:
  artifact:
    description: Type of artifact to lint (builddir, repo, manifest, appstream)
    required: true
  path:
    description: Path to flatpak-builder manifest or Flatpak build directory
    required: true
  working-directory:
    description: Working directory to clone flatpak-builder-lint
    default: ${{ github.workspace }}
runs:
  using: composite
  steps:
    - name: Check Runner Operating System
      if: runner.os != 'Linux'
      shell: bash --noprofile --norc -eo errexit -eo pipefail -eo nounset {0}
      run: |
        : Check Runner Operating System
        echo '::error::lint-obs/lint-flatpak-manifest action requires a Linux-based runner.'
        exit 1

    - name: Check artifact type
      shell: bash --noprofile --norc -eo pipefail {0}
      working-directory: ${{ inputs.working-directory }}
      env:
        ARTIFACT_TYPE: ${{ inputs.artifact }}
      run: |
        : Check artifact input
        if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi

        shopt -s extglob

        if [[ "${ARTIFACT_TYPE}" != @(builddir|repo|manifest|appstream) ]]; then
          echo "::error::Unsupported artifact type '${ARTIFACT_TYPE}'."
          exit 1
        fi

    - name: Run flatpak-builder-lint
      shell: bash --noprofile --norc -eo errexit -eo pipefail -eo nounset {0}
      working-directory: ${{ inputs.working-directory }}
      env:
        ARTIFACT_TYPE: ${{ inputs.artifact }}
        INPUT_PATH: ${{ inputs.path }}
      run: |
        : Run flatpak-builder-lint
        if [[ -n "${RUNNER_DEBUG:-}" ]]; then set -x; fi

        flatpak-builder-lint \
          --exceptions \
          --user-exceptions "${GITHUB_ACTION_PATH}/exceptions.json" \
          --gha-format \
          "${ARTIFACT_TYPE}" \
          "${INPUT_PATH}"
