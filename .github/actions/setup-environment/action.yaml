name: Setup Environment
description: Sets up common build environment values as action outputs for workflows
inputs:
  target:
    description: Build target
    required: false
    default: ''
  xcode-version:
    description: Xcode version to use for workflow (macOS)
    required: false
    default: ''
  working-directory:
    description: Custom working directory with a complete obs-studio checkout
    required: false
    default: ${{ github.workspace }}
outputs:
  commit-hash:
    description: Short hash of the commit SHA that triggered the workflow.
    value: ${{ steps.setup.outputs.commit-hash }}
  codesign:
    description: Flag to enable codesigning for current workflow
    value: ${{ steps.setup.outputs.codesign }}
  notarize:
    description: Flag to enable notarization for current workflow.
    value: ${{ steps.setup.outputs.notarize }}
  package:
    description: Flag to enable artifact generation and packaging.
    value: ${{ steps.setup.outputs.package }}
  config:
    description: Build configuration to use for builds.
    value: ${{ steps.setup.outputs.config }}
  cpu-name:
    description: Canonical architecture name used for builds.
    value: ${{ steps.setup-platform.outputs.cpu-name }}
  xcode-cas-path:
    description: Path to Xcode CAS compilation cache
    value: ${{ steps.setup-platform.outputs.xcode-cas-path }}
  sparkle-version:
    description: Sparkle version to use for update generation
    value: ${{ steps.setup-platform.outputs.sparkle-version}}
  sparkle-url:
    description: Download URL for Sparkle
    value: ${{ steps.setup-platform.outputs.sparkle-url}}
  sparkle-checksum:
    description: Checksum for Sparkle download
    value: ${{ steps.setup-platform.outputs.sparkle-checksum}}
  obs-update-channel:
    description: Update channel to generate Appcasts and Windows update files for
    value: ${{ steps.setup.outputs.obs-update-channel}}
  flatpak-matrix:
    description: A JSON string representing an array of Flatpak release channels.
    value: ${{ steps.setup-platform.outputs.flatpak-matrix }}
  pvs-studio-versipn:
    description: PVS-Studio version for static code analysis on Windows
    value: ${{ steps.setup-platform.outputs.pvs-studio-version}}
  pvs-studio-url:
    description: Download URL for PVS-Studio
    value: ${{ steps.setup-platform.outputs.pvs-studio-url}}
  pvs-studio-checksum:
    description: Checksum for PVS-Studio download
    value: ${{ steps.setup-platform.outputs.pvs-studio-checksum}}
  valid-version-tag:
    description: Flag for current tag passing release version requirement checks.
    value: ${{ steps.setup.outputs.valid-version-tag }}
runs:
  using: composite
  steps:
    - name: Setup Environment
      id: setup
      shell: bash --errexit --noprofile --norc -eo pipefail {0}
      working-directory: ${{ inputs.working-directory }}
      env:
        GITHUB_EVENT_NUMBER: ${{ github.event.number }}
        GH_TOKEN: ${{ github.token }}
      run: ${GITHUB_ACTION_PATH}/setup-environment.bash

    - name: Setup Windows
      id: setup-platform
      if: runner.os == 'Windows'
      shell: pwsh -command ". '{0}'"
      working-directory: ${{ inputs.working-directory }}
      env:
        TARGET: ${{ inputs.target }}
      run: ${GITHUB_ACTION_PATH}/Setup-Windows.ps1

    - name: Setup macOS
      id: setup-platform
      if: runner.os == 'macOS'
      shell: bash --errexit --noprofile --norc -eo pipefail {0}
      working-directory: ${{ inputs.working-directory }}
      env:
        TARGET: ${{ inputs.target }}
        XCODE_VERSION: ${{ inputs.xcode-version }}
      run: zsh --errexit --no-rcs ${GITHUB_ACTION_PATH}/setup-macos.zsh

    - name: Setup Ubuntu
      id: setup-platform
      if: runner.os == 'Linux'
      shell: bash --errexit --noprofile --norc -eo pipefail {0}
      working-directory: ${{ inputs.working-directory }}
      run: ${GITHUB_ACTION_PATH}/setup-ubuntu.bash
